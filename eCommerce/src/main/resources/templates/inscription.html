<!DOCTYPE html>
<html th:replace="~{base :: html}" lang="fr" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="content">

    <section class="py-5" style="background:var(--gris);min-height:80vh;display:flex;align-items:center;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="bg-white p-5 shadow" style="border-radius:6px;">
                        <h2 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;margin-bottom:4px;">Créer un compte</h2>
                        <p class="text-muted mb-4" style="font-size:0.9rem;">Déjà inscrit ? <a th:href="@{/connexion}" style="color:var(--rouge);font-weight:600;">Se connecter</a></p>

                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;">Prénom</label>
                                    <input type="text" class="form-control" placeholder="Jean" style="border-radius:2px;padding:12px 14px;">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;">Nom</label>
                                    <input type="text" class="form-control" placeholder="Dupont" style="border-radius:2px;padding:12px 14px;">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;">Email</label>
                                    <input type="email" class="form-control" placeholder="jean@exemple.fr" style="border-radius:2px;padding:12px 14px;">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;">Mot de passe</label>
                                    <input type="password" class="form-control" placeholder="••••••••" style="border-radius:2px;padding:12px 14px;">
                                </div>
                                <div class="col-12">
                                    <label class="form-label fw-semibold" style="font-size:0.82rem;text-transform:uppercase;letter-spacing:1px;">Confirmer le mot de passe</label>
                                    <input type="password" class="form-control" placeholder="••••••••" style="border-radius:2px;padding:12px 14px;">
                                </div>
                                <div class="col-12">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="cgv">
                                        <label class="form-check-label" for="cgv" style="font-size:0.85rem;">
                                            J'accepte les <a href="#" style="color:var(--rouge);">Conditions Générales de Vente</a>
                                        </label>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <button type="submit" class="btn-rouge d-block w-100 text-center">Créer mon compte</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

</div>
</html>
